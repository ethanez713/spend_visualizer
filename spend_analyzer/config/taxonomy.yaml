# Merchant overrides: regex on merchant_name OR exact merchant_entity_id.
# Example splits 'Uber Eats' (food) from 'Uber' (rideshare).
merchant_overrides:
  '(?i)uber\s*eats': {tier1: 'Dining Out', tier2: 'Restaurant'}
  '(?i)doordash|grubhub': {tier1: 'Dining Out', tier2: 'Restaurant'}
