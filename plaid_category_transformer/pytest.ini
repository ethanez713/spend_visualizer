[pytest]
# Put the repo root on sys.path so tests can `import src.transformer` etc. (the src/
# package is imported as `src.*`, matching the categorize.py shim and transactions/).
pythonpath = .
testpaths = tests
# House test-naming style: given_<precondition>_when_<action>_then_<result>.
python_functions = given_* test_*
